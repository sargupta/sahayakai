name: AI Flow Evals

# Blocking quality gate for the product's core asset: AI output quality in
# the languages we promise. Runs the golden datasets in
# sahayakai-main/src/ai/eval-datasets/ through the real flow wrappers and
# fails on schema errors, empty output, wrong-language output, or router
# misroutes. (Rewritten 2026-07-03 — the old genkit eval:flow workflow was
# inert AND had continue-on-error on every step.)

on:
  pull_request:
    paths:
      - 'sahayakai-main/src/ai/**'
      - 'sahayakai-main/scripts/eval/**'
  schedule:
    - cron: '0 6 * * 1' # Weekly full run: Monday 6 AM UTC
  workflow_dispatch:

concurrency:
  group: ai-evals-${{ github.ref }}
  cancel-in-progress: true

jobs:
  evaluate:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    defaults:
      run:
        working-directory: sahayakai-main
    env:
      GOOGLE_GENAI_API_KEY: ${{ secrets.GENKIT_EVAL_API_KEY }}
      # Flows touch Firebase Admin (feature flags, rate limits, persistence).
      # Reuses the deploy SA. Datasets minimize writes (falsy userId skips
      # persistence); the residue is a couple of rate-limit docs for
      # 'eval-harness-user' per run.
      FIREBASE_SERVICE_ACCOUNT_KEY: ${{ secrets.GCP_SA_KEY }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: sahayakai-main/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Validate dataset structure (no API spend)
        run: npx tsx --import ./scripts/eval/register-shims.mjs scripts/eval/run-evals.mts --all --dry
      - name: Require eval API key
        run: |
          if [ -z "$GOOGLE_GENAI_API_KEY" ]; then
            echo "::error::GENKIT_EVAL_API_KEY repo secret is not set. Live AI evals CANNOT run."
            echo "::error::Add a Gemini API key as the GENKIT_EVAL_API_KEY secret (repo Settings -> Secrets). This gate is blocking by design: AI output quality is the product."
            exit 1
          fi
      - name: Run live evals (blocking)
        run: npx tsx --import ./scripts/eval/register-shims.mjs scripts/eval/run-evals.mts --all
      - name: Upload eval report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: eval-report
          path: sahayakai-main/eval-results/
          retention-days: 30
