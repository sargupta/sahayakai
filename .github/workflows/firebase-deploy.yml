name: Deploy to Firebase Hosting and Functions

# Disabled 2026-05-21: this workflow auto-deploys Firebase Hosting on
# push to main, racing with the manual scripts/safe-deploy.sh which is
# the canonical deploy path. Re-enable only after the preview env +
# branch-protection pipeline lands (see plan at
# .claude/plans/based-on-the-current-tidy-rabbit.md, Phase A + B + D).
# Manual run via workflow_dispatch is still allowed for emergencies.
on:
  workflow_dispatch:

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sahayakai-main
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: sahayakai-main/package-lock.json

      - name: Install Dependencies
        run: npm install

      - name: Run Tests
        run: npm test
        continue-on-error: true

      - name: Build Next.js
        run: npm run build
        env:
          NEXT_PUBLIC_FIREBASE_PROJECT_ID: sahayakai-b4248
          NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: sahayakai-b4248.firebasestorage.app

      - name: Deploy to Firebase
        if: github.ref == 'refs/heads/main'
        run: |
          echo '${{ secrets.GCP_SA_KEY }}' > /tmp/sa-key.json
          export GOOGLE_APPLICATION_CREDENTIALS=/tmp/sa-key.json
          npx firebase-tools@latest deploy --only hosting --project sahayakai-b4248 --force
          rm -f /tmp/sa-key.json
        env:
          FIREBASE_CLI_EXPERIMENTS: webframeworks
