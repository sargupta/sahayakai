name: Test Suite

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: test-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18, 20]

    defaults:
      run:
        working-directory: sahayakai-main

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
          cache-dependency-path: sahayakai-main/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Unit & integration tests
        run: npm test -- --ci --coverage

      - name: Build
        run: npm run build
        env:
          # Stub env vars so next build doesn't fail on missing secrets
          GOOGLE_GENAI_API_KEY: stub
          GOOGLE_CLOUD_PROJECT: stub
          NEXT_PUBLIC_FIREBASE_API_KEY: stub
          NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: stub
          NEXT_PUBLIC_FIREBASE_PROJECT_ID: stub
          NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: stub
          NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: stub
          NEXT_PUBLIC_FIREBASE_APP_ID: stub

      - name: Upload coverage
        if: matrix.node-version == 20 && github.event_name == 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: sahayakai-main/coverage/
          retention-days: 7
