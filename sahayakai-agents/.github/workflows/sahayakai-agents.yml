name: sahayakai-agents CI

on:
  pull_request:
    paths:
      - 'sahayakai-agents/**'
  workflow_dispatch:

defaults:
  run:
    working-directory: sahayakai-agents

jobs:
  lint-test-codegen:
    name: lint + test + codegen drift
    runs-on: ubuntu-latest
    timeout-minutes: 15

    env:
      SAHAYAKAI_AGENTS_ENV: development
      GOOGLE_CLOUD_PROJECT: sahayakai-b4248-test
      SAHAYAKAI_REQUEST_SIGNING_KEY: test-signing-key-for-ci-runs-only

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install sahayakai-agents with dev extras
        run: |
          python -m pip install --upgrade pip
          pip install -e '.[dev]'

      - name: Ruff
        run: ruff check src/ tests/

      - name: mypy (informational)
        run: mypy src/
        continue-on-error: true

      - name: pytest (unit + integration)
        run: |
          pytest -m "unit or integration" \
            --cov=sahayakai_agents \
            --cov-report=term-missing \
            --cov-report=xml

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-xml
          path: sahayakai-agents/coverage.xml
          retention-days: 7

      - name: Regenerate TypeScript types
        run: python scripts/codegen_ts.py

      - name: Fail on TypeScript codegen drift
        run: |
          if ! git diff --exit-code dist/types.generated.ts; then
            echo "::error ::dist/types.generated.ts is stale. Run scripts/codegen_ts.py locally and commit the result."
            exit 1
          fi
