# Cloud Run service declaration — sahayakai-agents.
#
# Review trace:
# - P0 #1: `autoscaling.knative.dev/minScale: "1"` is a hard requirement.
# - P0 #2: GOOGLE_GENAI_SHADOW_API_KEY is a distinct secret, not shared with
#   the live pool.
# - P1 #12: service account is the ONLY allowed invoker surface; Next.js
#   must authenticate via its own SA's identity token.
#
# Apply via:
#   gcloud run services replace deploy/service.yaml \
#     --region=asia-southeast1 --project=sahayakai-b4248
#
# Substitute ${IMAGE} at deploy time from cloudbuild.yaml.
apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: sahayakai-agents
  annotations:
    run.googleapis.com/ingress: internal-and-cloud-load-balancing
spec:
  template:
    metadata:
      annotations:
        autoscaling.knative.dev/minScale: "1"
        autoscaling.knative.dev/maxScale: "10"
        run.googleapis.com/cpu-throttling: "false"
        run.googleapis.com/execution-environment: gen2
        # Round-2 audit P0 BOOT-1: 100% CPU during cold start cuts the
        # google-adk + pybars3 + sentence-transformers import time
        # from ~3.5s to ~1.5s. Cheap; the boost only applies during
        # the first request, not steady-state.
        run.googleapis.com/startup-cpu-boost: "true"
    spec:
      serviceAccountName: sahayakai-agents-runtime@sahayakai-b4248.iam.gserviceaccount.com
      # Round-2 audit P0 TIMEOUT-1: was 12s. Next.js client times out
      # at 3.5s; resilience-layer max_total_backoff is 7s. Cap at 8s so
      # any request that genuinely runs longer than the client cares
      # about dies promptly instead of pinning the instance.
      timeoutSeconds: 8
      containerConcurrency: 20 # Tune via load test post G10.
      containers:
        - image: ${IMAGE}
          ports:
            - name: http1
              containerPort: 8080
          resources:
            limits:
              cpu: "1"
              memory: "1Gi"
          env:
            - name: SAHAYAKAI_AGENTS_ENV
              value: production
            - name: GOOGLE_CLOUD_PROJECT
              value: sahayakai-b4248
            - name: GOOGLE_CLOUD_REGION
              value: asia-southeast1
            # Audience claim that ID-token verification compares against.
            # Hydrated post-deploy by `scripts/hydrate-audience-secret.sh`,
            # which writes the resolved Cloud Run URL into Secret Manager
            # as a new version of SAHAYAKAI_AGENTS_AUDIENCE. The secret is
            # mounted with `key: latest` so a redeploy after rotation
            # picks up the new version automatically — but a Cloud Run
            # secret mount does NOT auto-refresh on version add, so any
            # rotation needs a `gcloud run services update-traffic` to
            # take effect.
            - name: SAHAYAKAI_AGENTS_AUDIENCE
              valueFrom:
                secretKeyRef:
                  name: SAHAYAKAI_AGENTS_AUDIENCE
                  key: latest
            - name: SAHAYAKAI_AGENTS_ALLOWED_INVOKERS
              value: sahayakai-hotfix-resilience-runtime@sahayakai-b4248.iam.gserviceaccount.com
            - name: GOOGLE_GENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: GOOGLE_GENAI_API_KEY
                  key: latest
            - name: GOOGLE_GENAI_SHADOW_API_KEY
              valueFrom:
                secretKeyRef:
                  name: GOOGLE_GENAI_SHADOW_API_KEY
                  key: latest
            - name: SAHAYAKAI_REQUEST_SIGNING_KEY
              valueFrom:
                secretKeyRef:
                  name: SAHAYAKAI_REQUEST_SIGNING_KEY
                  key: latest
          startupProbe:
            httpGet:
              path: /readyz
              port: 8080
            initialDelaySeconds: 0
            periodSeconds: 2
            timeoutSeconds: 1
            failureThreshold: 30
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 3
  traffic:
    - percent: 100
      latestRevision: true
