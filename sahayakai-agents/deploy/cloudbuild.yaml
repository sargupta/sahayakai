# Cloud Build pipeline for sahayakai-agents.
# Invoked manually in Phase 1; hooked to a trigger later.
#
#   gcloud builds submit --config=deploy/cloudbuild.yaml \
#     --project=sahayakai-b4248 --region=asia-southeast1 .
#
# Round-2 P1-7 fix: the previous version deployed via `gcloud run deploy`
# which ignored `deploy/service.yaml` entirely (no min-instances, no
# secrets, no allowed invokers, no ingress restriction). We now substitute
# the image into service.yaml with `envsubst` and use `gcloud run services
# replace` so every setting lands.

substitutions:
  _REGION: asia-southeast1
  _REPO: sahayakai
  _SERVICE: sahayakai-agents
  _STAGING_SUFFIX: -staging
  # Audience claim the staging sidecar's ID-token verifier compares against.
  # Set as a PLAIN env var (not a secret mount) for staging so the prod
  # SAHAYAKAI_AGENTS_AUDIENCE secret — which holds the PROD sidecar URL —
  # does not leak into staging and produce a 401 cascade. See
  # qa/results/lane-F/Q4_B_AUDIENCE_FIX.md for the root-cause writeup.
  _STAGING_AUDIENCE_URL: https://sahayakai-agents-staging-zwydpvyuca-as.a.run.app

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: E2_HIGHCPU_8

steps:
  - id: test
    name: python:3.12-slim
    entrypoint: bash
    args:
      - -ceu
      - |
        pip install --quiet --upgrade pip
        pip install --quiet '.[dev]'
        pytest tests/unit -q --deselect tests/unit/test_action_flow_ts_parity.py

  - id: build
    name: gcr.io/cloud-builders/docker
    args:
      - build
      - --tag=${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/${_SERVICE}:$SHORT_SHA
      - --tag=${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/${_SERVICE}:latest
      - .
    waitFor: [test]

  - id: push
    name: gcr.io/cloud-builders/docker
    args:
      - push
      - --all-tags
      - ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/${_SERVICE}

  # Materialise the service spec with the concrete image, then apply it.
  # `gcloud run services replace` is the only command that respects every
  # annotation and env binding declared in service.yaml.
  - id: render-staging-service
    name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: bash
    args:
      - -ceu
      - |
        apt-get update && apt-get install -y --no-install-recommends gettext-base
        export IMAGE=${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/${_SERVICE}:$SHORT_SHA
        envsubst '$${IMAGE}' < deploy/service.yaml > /workspace/service.rendered.yaml
        # Staging suffix applied to the Knative Service metadata.name so
        # staging and prod coexist.
        sed -i "s/^  name: ${_SERVICE}$/  name: ${_SERVICE}${_STAGING_SUFFIX}/" /workspace/service.rendered.yaml
        # Audience-secret drift fix: the SAHAYAKAI_AGENTS_AUDIENCE secret
        # holds the PROD sidecar URL. For staging, replace the env block
        # with a plain `value:` pointing at the staging URL so the staging
        # sidecar's ID-token verifier accepts tokens minted for itself
        # (the prod next.js dispatcher uses NEXT_PUBLIC_SAHAYAKAI_AGENTS_URL
        # to choose audience; mismatched audience -> 401 -> silent Genkit
        # fallback). Skipped when _STAGING_SUFFIX is empty (prod deploy).
        # See qa/results/lane-F/Q4_B_AUDIENCE_FIX.md.
        if [ -n "${_STAGING_SUFFIX}" ]; then
          sed -i -e '/^            - name: SAHAYAKAI_AGENTS_AUDIENCE$/,/^                  key: latest$/c\
            - name: SAHAYAKAI_AGENTS_AUDIENCE\
              value: "${_STAGING_AUDIENCE_URL}"' /workspace/service.rendered.yaml
          if grep -q '^                  name: SAHAYAKAI_AGENTS_AUDIENCE$' /workspace/service.rendered.yaml; then
            echo "ERROR: SAHAYAKAI_AGENTS_AUDIENCE secretKeyRef still present after staging override" >&2
            exit 1
          fi
          if ! grep -q "value: \"${_STAGING_AUDIENCE_URL}\"" /workspace/service.rendered.yaml; then
            echo "ERROR: staging audience plain value not injected" >&2
            exit 1
          fi
          echo "Staging audience override applied: ${_STAGING_AUDIENCE_URL}"
        fi
        cat /workspace/service.rendered.yaml

  - id: deploy-staging
    name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args:
      - run
      - services
      - replace
      - /workspace/service.rendered.yaml
      - --region=${_REGION}
      - --project=${PROJECT_ID}
    waitFor: [render-staging-service]

images:
  - ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/${_SERVICE}:$SHORT_SHA
  - ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/${_SERVICE}:latest
