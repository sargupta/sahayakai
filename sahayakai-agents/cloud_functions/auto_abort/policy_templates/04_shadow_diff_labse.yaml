# Cloud Monitoring alert policy: shadow-diff mean LaBSE < 0.75 over 500 calls.
#
# Active during shadow-mode ramp only. The shadow-diff Cloud Function
# (separate, periodic Cloud Scheduler trigger) reads the rolling
# `agent_shadow_diffs/{date}/calls/**` window, runs IndicSBERT cosine
# (and optionally Gemini-judge) over each pair, and emits a custom
# metric `custom.googleapis.com/parent_call/shadow_labse_mean`. This
# alert keys off that metric.
#
# Prerequisite: the rollup function must be deployed and writing the
# metric (track-D infrastructure, separate plan).
displayName: "parent-call sidecar — shadow LaBSE < 0.75 (rolling 500)"
documentation:
  content: |
    Shadow-mode parity has dropped below the cutover gate (mean LaBSE
    < 0.75 over the last 500 calls). The auto-abort Cloud Function will
    demote one step. Likely causes: prompt drift between Genkit and the
    sidecar, model version mismatch, an Indic-language regression that
    only surfaces under live traffic distribution.
  mimeType: text/markdown
combiner: OR
conditions:
  - displayName: "mean LaBSE < 0.75"
    conditionThreshold:
      filter: |
        metric.type = "custom.googleapis.com/parent_call/shadow_labse_mean"
      comparison: COMPARISON_LT
      thresholdValue: 0.75
      duration: 900s
      aggregations:
        - alignmentPeriod: 300s
          perSeriesAligner: ALIGN_MEAN
notificationChannels:
  - "${AUTO_ABORT_PUBSUB_CHANNEL}"
alertStrategy:
  autoClose: 86400s
