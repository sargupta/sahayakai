# Cloud Monitoring alert policy: shadow-diff mean parity < threshold.
#
# Active during shadow-mode ramp only. The shadow-diff Cloud Function
# reads the rolling `agent_shadow_diffs/{date}/shadow_calls/**` window
# and emits `custom.googleapis.com/parent_call/shadow_labse_mean` and
# `custom.googleapis.com/parent_call/shadow_sample_count`.
#
# Round-2 audit P0 ALERT-1 fix (30-agent review, group F6):
# the previous threshold was 0.75 but the rollup default is
# `USE_EMBEDDINGS=0` (TF cosine). TF cosine on Indic paraphrases
# typically lands well below 0.75, so the alert fired constantly on
# clean traffic and auto-abort demoted itself to floor on every deploy.
#
# Two fixes:
# 1. Threshold lowered to 0.30 — appropriate for TF cosine on
#    multilingual paraphrases. When the operator enables
#    `USE_EMBEDDINGS=1` for IndicSBERT (the planned Track D step-up
#    gate), they should bump this back up to 0.75 (as a separate
#    alert policy update) since SBERT scores run higher.
# 2. Sample-count gate added: alert ignores values where the rolling
#    window has < 50 samples. Tiny windows produce noisy means; firing
#    on those wastes operator attention. Implemented as a multi-
#    condition policy so EITHER condition must hold (combiner: AND).
displayName: "parent-call sidecar — shadow parity < 0.30 (rolling, n>=50)"
documentation:
  content: |
    Shadow-mode parity dropped below 0.30 over the last 15 minutes
    AND the rolling sample window has at least 50 entries. Threshold
    is calibrated for TF cosine (the rollup function's default
    scoring tier); raise it to 0.75 IF the rollup is reconfigured
    with `USE_EMBEDDINGS=1` (IndicSBERT) — the threshold should be
    updated in lockstep with the scoring tier.

    Likely causes: prompt drift between Genkit and the sidecar, model
    version mismatch, an Indic-language regression that only surfaces
    under live traffic distribution.
  mimeType: text/markdown
combiner: AND  # both conditions must hold (low parity AND enough samples)
conditions:
  - displayName: "mean parity < 0.30"
    conditionThreshold:
      filter: |
        metric.type = "custom.googleapis.com/parent_call/shadow_labse_mean"
      comparison: COMPARISON_LT
      thresholdValue: 0.30
      duration: 900s
      aggregations:
        - alignmentPeriod: 300s
          perSeriesAligner: ALIGN_MEAN
  - displayName: "sample count >= 50"
    conditionThreshold:
      filter: |
        metric.type = "custom.googleapis.com/parent_call/shadow_sample_count"
      comparison: COMPARISON_GT
      thresholdValue: 50
      duration: 900s
      aggregations:
        - alignmentPeriod: 300s
          perSeriesAligner: ALIGN_MEAN
notificationChannels:
  - "${AUTO_ABORT_PUBSUB_CHANNEL}"
alertStrategy:
  autoClose: 86400s
