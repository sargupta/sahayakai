# cloudbuild.yaml
#
# Single source of truth for the SahayakAI Cloud Run deploy pipeline.
# Triggered by `git push origin main` via the Cloud Build GitHub trigger
# `sahayakai-main-deploy` (see scripts/setup-build-trigger.sh).
#
# Steps:
#   1. Build the Docker image, tag it with both :latest and :<short-sha>.
#   2. Push both tags to Artifact Registry.
#   3. Deploy to Cloud Run with --no-traffic. The new revision is built
#      and held warm but does NOT auto-receive traffic. A human (or
#      release agent) flips it explicitly via:
#          gcloud run services update-traffic sahayakai-hotfix-resilience \
#              --region=asia-southeast1 --project=$PROJECT_ID --to-latest
#
# Why --no-traffic? Because two parallel pushes can race. If either
# auto-routed traffic on success, whichever finished last would clobber
# the other. With --no-traffic, both produce ready revisions and the
# operator picks the winner explicitly.
#
# Variables:
#   $PROJECT_ID  — provided by Cloud Build automatically
#   $SHORT_SHA   — provided by Cloud Build automatically (first 7 chars)
#   $_SERVICE    — substitution; set per trigger or default below. Used by
#                  scripts/safe-deploy.sh's build-in-flight guard to scope
#                  the ongoing-build check to a specific Cloud Run service,
#                  so a preview build does not block a prod deploy.

substitutions:
  _SERVICE: sahayakai-hotfix-resilience

steps:
  # ── 1. Build ──────────────────────────────────────────────────────────────
  # `dir: sahayakai-main` is required: Cloud Build clones the WHOLE repo
  # to /workspace, so without this step's `dir`, --file=Dockerfile would
  # resolve to /workspace/Dockerfile (which doesn't exist — Dockerfile
  # lives at /workspace/sahayakai-main/Dockerfile).
  - id: build
    name: gcr.io/cloud-builders/docker
    dir: sahayakai-main
    args:
      - build
      - --tag=asia-southeast1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/sahayakai-hotfix-resilience:$SHORT_SHA
      - --tag=asia-southeast1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/sahayakai-hotfix-resilience:latest
      - --build-arg=GIT_SHA=$SHORT_SHA
      - --build-arg=GIT_SHA_FULL=$COMMIT_SHA
      - --build-arg=BUILD_ID=$BUILD_ID
      - --file=Dockerfile
      - .

  # ── 2. Push both tags ─────────────────────────────────────────────────────
  - id: push-sha
    name: gcr.io/cloud-builders/docker
    args:
      - push
      - asia-southeast1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/sahayakai-hotfix-resilience:$SHORT_SHA
    waitFor: [build]
  - id: push-latest
    name: gcr.io/cloud-builders/docker
    args:
      - push
      - asia-southeast1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/sahayakai-hotfix-resilience:latest
    waitFor: [build]

  # ── 3. Deploy to Cloud Run, NO traffic ────────────────────────────────────
  # Tag the revision with the short sha so it is reachable directly at
  # https://dep-<sha>---<service>-<hash>.run.app for verification.
  # F1-04 fix (2026-06-06): Twilio credentials moved to Secret Manager.
  # `--update-secrets` is idempotent: it (re)binds the env var to a
  # Secret Manager version on every deploy, so the secret reference
  # survives even if a future operator runs an ad-hoc `gcloud run deploy`
  # that resets env. Plaintext TWILIO_ACCOUNT_SID / TWILIO_AUTH_TOKEN env
  # vars MUST NOT be reintroduced — they would be readable by any
  # principal holding `run.services.get`.
  - id: deploy
    name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args:
      - run
      - deploy
      - sahayakai-hotfix-resilience
      - --image=asia-southeast1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/sahayakai-hotfix-resilience:$SHORT_SHA
      - --region=asia-southeast1
      - --project=$PROJECT_ID
      - --no-traffic
      - --tag=sha-$SHORT_SHA
      - --update-secrets=TWILIO_ACCOUNT_SID=TWILIO_ACCOUNT_SID:latest,TWILIO_AUTH_TOKEN=TWILIO_AUTH_TOKEN:latest,SAHAYAKAI_AGENTS_AUDIENCE=SAHAYAKAI_AGENTS_AUDIENCE:latest
      # Sidecar URL — pinned to PROD service so a fresh deploy cannot
      # silently inherit a staging URL from a previous ad-hoc env override.
      # 2026-06-06 (parent-call attendance diagnosis): the live revision was
      # serving with NEXT_PUBLIC_SAHAYAKAI_AGENTS_URL pointing at the staging
      # sidecar — every parent-call turn fired the shadow-diff pair via
      # Promise.all and the sidecar leg burned its full timeout against
      # staging from prod before the dispatcher gave up, slowing the call.
      # The audience secret (verified at the sidecar) was also pointing at
      # staging. Both are now pinned at the deploy step. If you really need
      # to point preview/staging deploys at the staging sidecar, do that in
      # a SEPARATE Cloud Build trigger — never as an ad-hoc env override on
      # the prod service.
      - --update-env-vars=NEXT_PUBLIC_SAHAYAKAI_AGENTS_URL=https://sahayakai-agents-zwydpvyuca-as.a.run.app
      - --quiet
    waitFor: [push-sha]

# Build options
options:
  # Use higher-CPU machine to keep Next.js build under 10 min.
  machineType: E2_HIGHCPU_8
  logging: CLOUD_LOGGING_ONLY
  # Avoid concurrent builds for the same trigger — Cloud Build will
  # queue subsequent invocations rather than running them in parallel.
  # (Setting CONCURRENCY=1 happens at the trigger level, not here.)

# Hard cap so a hung build never blocks the queue forever.
timeout: 1800s

# Image list for Cloud Build artifact tracking.
images:
  - asia-southeast1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/sahayakai-hotfix-resilience:$SHORT_SHA
  - asia-southeast1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/sahayakai-hotfix-resilience:latest
