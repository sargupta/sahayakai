# SahayakAI Social Automation Stack
#
# Self-hosted: n8n (orchestrator) + Twenty CRM + Postgres + Redis +
# Baileys worker + Instagrapi worker.
#
# Target host: GCP e2-micro (always-free) for n8n/Twenty/Postgres,
# Cloud Run for the workers in prod. This compose is for local dev
# and the VM bootstrap — workers can also run here for one-shot e2e.
#
# Run:   docker compose -f docker-compose.social.yml up -d
# Stop:  docker compose -f docker-compose.social.yml down
#
# Env file: copy .env.social.example -> .env.social, fill values, then:
#   docker compose --env-file .env.social -f docker-compose.social.yml up -d

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${PG_USER:-sahayak}
      POSTGRES_PASSWORD: ${PG_PASSWORD:?set in .env.social}
      POSTGRES_DB: ${PG_DB:-sahayak_social}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PG_USER:-sahayak}"]
      interval: 10s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes", "--requirepass", "${REDIS_PASSWORD:?set in .env.social}"]
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  n8n:
    image: n8nio/n8n:latest
    restart: unless-stopped
    depends_on:
      postgres: { condition: service_healthy }
      redis:    { condition: service_healthy }
    ports:
      - "5678:5678"
    environment:
      N8N_HOST: ${N8N_HOST:-localhost}
      N8N_PORT: 5678
      N8N_PROTOCOL: ${N8N_PROTOCOL:-http}
      WEBHOOK_URL: ${N8N_WEBHOOK_URL:-http://localhost:5678/}
      DB_TYPE: postgresdb
      DB_POSTGRESDB_HOST: postgres
      DB_POSTGRESDB_DATABASE: n8n
      DB_POSTGRESDB_USER: ${PG_USER:-sahayak}
      DB_POSTGRESDB_PASSWORD: ${PG_PASSWORD}
      N8N_ENCRYPTION_KEY: ${N8N_ENCRYPTION_KEY:?32+ char random string}
      EXECUTIONS_MODE: regular
      QUEUE_BULL_REDIS_HOST: redis
      QUEUE_BULL_REDIS_PASSWORD: ${REDIS_PASSWORD}
      GENERIC_TIMEZONE: Asia/Kolkata
    volumes:
      - n8ndata:/home/node/.n8n
      - ./../n8n/workflows:/workflows:ro

  twenty:
    image: twentycrm/twenty:latest
    restart: unless-stopped
    depends_on:
      postgres: { condition: service_healthy }
      redis:    { condition: service_healthy }
    ports:
      - "3001:3000"
    environment:
      PG_DATABASE_URL: postgres://${PG_USER:-sahayak}:${PG_PASSWORD}@postgres:5432/twenty
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      SERVER_URL: ${TWENTY_SERVER_URL:-http://localhost:3001}
      FRONT_BASE_URL: ${TWENTY_SERVER_URL:-http://localhost:3001}
      APP_SECRET: ${TWENTY_APP_SECRET:?32+ char random string}
      SIGN_IN_PREFILLED: "true"
      STORAGE_TYPE: local
    volumes:
      - twentydata:/app/.local-storage

  baileys-worker:
    build: ./baileys-worker
    restart: unless-stopped
    depends_on:
      redis: { condition: service_healthy }
    ports:
      - "8081:8081"
    environment:
      PORT: 8081
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      INTERNAL_API_KEY: ${INTERNAL_API_KEY:?shared with Next.js app}
      LOG_LEVEL: info
      # Antiban defaults — see services/baileys-worker/README.md
      MIN_DELAY_MS: 4000
      MAX_DELAY_MS: 12000
      DAILY_CAP: 80
    volumes:
      - baileysauth:/app/auth

  ig-worker:
    build: ./ig-worker
    restart: unless-stopped
    depends_on:
      redis: { condition: service_healthy }
    ports:
      - "8082:8000"
    environment:
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      INTERNAL_API_KEY: ${INTERNAL_API_KEY}
      # One static proxy per IG account — populate via /accounts API.
      LOG_LEVEL: info
    volumes:
      - igsessions:/app/sessions

volumes:
  pgdata:
  redisdata:
  n8ndata:
  twentydata:
  baileysauth:
  igsessions:
