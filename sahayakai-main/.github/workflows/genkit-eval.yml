name: Genkit Evaluations

on:
  pull_request:
    paths:
      - 'src/ai/**'
  schedule:
    - cron: '0 6 * * 1' # Weekly: Monday 6 AM UTC
  workflow_dispatch:

env:
  GOOGLE_GENAI_API_KEY: ${{ secrets.GENKIT_EVAL_API_KEY }}

jobs:
  evaluate:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Genkit CLI
        run: npm install -g genkit-cli

      - name: Create eval results directory
        run: mkdir -p eval-results

      - name: Run Quiz Generator evaluation
        continue-on-error: true
        run: npx genkit eval:flow quizGeneratorFlow --input src/ai/eval-datasets/quiz-generator.json --output eval-results/quiz.json

      - name: Run Lesson Plan Generator evaluation
        continue-on-error: true
        run: npx genkit eval:flow lessonPlanFlow --input src/ai/eval-datasets/lesson-plan-generator.json --output eval-results/lesson-plan.json

      - name: Run Exam Paper Generator evaluation
        continue-on-error: true
        run: npx genkit eval:flow examPaperGeneratorFlow --input src/ai/eval-datasets/exam-paper-generator.json --output eval-results/exam-paper.json

      - name: Upload eval results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: eval-results
          path: eval-results/
          retention-days: 30

      - name: Post eval summary as PR comment
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = require('path');

            const flows = ['quiz', 'lesson-plan', 'exam-paper'];
            let summary = '## Genkit Evaluation Results\n\n';

            for (const flow of flows) {
              const filePath = path.join('eval-results', `${flow}.json`);
              if (fs.existsSync(filePath)) {
                const data = JSON.parse(fs.readFileSync(filePath, 'utf8'));
                const testCases = Array.isArray(data) ? data.length : 0;
                summary += `### ${flow}\n- Test cases: ${testCases}\n- Status: Completed\n\n`;
              } else {
                summary += `### ${flow}\n- Status: **Skipped or failed** (result file not found)\n\n`;
              }
            }

            summary += `\n_Run triggered by \`${context.eventName}\` at ${new Date().toISOString()}_`;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: summary,
            });
